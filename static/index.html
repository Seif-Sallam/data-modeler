<script>
const $ = (s)=>document.querySelector(s);
let state = null; // current draft
let currentDraftName = null;
let currentTabId = null;
let zoom = 1, panX=0, panY=0;
function saveView(){
  const tab = currentTab(); if(!tab) return;
  tab.view = { panX, panY, zoom };
}
function restoreView(){
  const tab = currentTab();
  const v = tab && tab.view;
  if(v){ panX = v.panX||0; panY = v.panY||0; zoom = v.zoom||1; }
  else { panX = 0; panY = 0; zoom = 1; }
  const cv = document.getElementById('canvas');
  const ls = document.getElementById('linkSvg');
  if(cv) cv.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
  if(ls) ls.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
  const z = document.getElementById('zoom'); if(z) z.textContent = Math.round(zoom*100)+'%';
}
const selection = new Set(); // keys like 'table:ID' or 'note:ID'
let selectionSticky = false; // true after Ctrl+A; cleared on next mousedown release
function selKey(type,id){ return type+':'+id; }
function isSelected(type,id){ return selection.has(selKey(type,id)); }
function clearSelection(){ if(!selection.size) return; selection.clear(); selectionSticky=false; document.querySelectorAll('.entity-selected').forEach(el=>el.classList.remove('entity-selected')); }
function applySelectionDom(){
  document.querySelectorAll('.entity-selected').forEach(el=>el.classList.remove('entity-selected'));
  selection.forEach(k=>{
    const [type,id] = k.split(':');
    const sel = type==='table' ? '.table[data-id="'+id+'"]' : '.note[data-id="'+id+'"]';
    const el = document.querySelector(sel); if(el) el.classList.add('entity-selected');
  });
}
function selectAll(){
  selection.clear();
  const tab = currentTab(); if(!tab) return;
  (tab.tables||[]).forEach(t=>selection.add(selKey('table',t.id)));
  (tab.notes||[]).forEach(n=>selection.add(selKey('note',n.id)));
  selectionSticky=true;
  applySelectionDom();
}
function getSelectedEntities(){
  const tab = currentTab(); if(!tab) return [];
  const out = [];
  selection.forEach(k=>{
    const [type,id] = k.split(':');
    const list = type==='table' ? tab.tables : tab.notes;
    const e = (list||[]).find(x=>x.id===id);
    if(e) out.push({type,e});
  });
  return out;
}
function toggleSelection(type, id){
  const k = selKey(type,id);
  if(selection.has(k)) selection.delete(k);
  else selection.add(k);
  selectionSticky = false;
  applySelectionDom();
}
let _groupDrag = null;
function startGroupDrag(primary, e){
  const primaryKey = selKey(primary.type, primary.entity.id);
  let items;
  if(selection.size && selection.has(primaryKey)){
    items = getSelectedEntities().map(it=>({type:it.type, e:it.e, ox:it.e.x, oy:it.e.y}));
  } else {
    items = [{type:primary.type, e:primary.entity, ox:primary.entity.x, oy:primary.entity.y}];
  }
  _groupDrag = { sx:e.clientX, sy:e.clientY, items };
  e.preventDefault();
}
window.addEventListener('mousemove',(e)=>{
  if(!_groupDrag) return;
  const dx = (e.clientX - _groupDrag.sx)/zoom;
  const dy = (e.clientY - _groupDrag.sy)/zoom;
  _groupDrag.items.forEach(it=>{
    it.e.x = it.ox + dx; it.e.y = it.oy + dy;
    const sel = it.type==='table' ? '.table[data-id="'+it.e.id+'"]' : '.note[data-id="'+it.e.id+'"]';
    const el = document.querySelector(sel);
    if(el){ el.style.left = it.e.x+'px'; el.style.top = it.e.y+'px'; }
  });
  renderLinks();
});
window.addEventListener('mouseup',()=>{ if(_groupDrag){ _groupDrag=null; markDirty(); } });
let linkFrom = null; // {table, col}
let dirty = false;
window.addEventListener('beforeunload',(e)=>{ if(dirty){ e.preventDefault(); e.returnValue=''; return ''; } });

function uid(){ return Math.random().toString(36).slice(2,9); }
function escHtml(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function mdToHtml(src){
  if(!src) return '<p style="opacity:.5">(empty)</p>';
  const lines = String(src).split('\n');
  const out = [];
  let i = 0;
  while(i < lines.length){
    let ln = lines[i];
    // fenced code block
    const fence = ln.match(/^```\s*(\S*)\s*$/);
    if(fence){
      const buf = [];
      i++;
      while(i < lines.length && !/^```\s*$/.test(lines[i])){ buf.push(lines[i]); i++; }
      i++;
      out.push('<pre><code>'+escHtml(buf.join('\n'))+'</code></pre>');
      continue;
    }
    // heading
    const h = ln.match(/^(#{1,3})\s+(.*)$/);
    if(h){ out.push('<h'+h[1].length+'>'+inline(h[2])+'</h'+h[1].length+'>'); i++; continue; }
    // horizontal rule
    if(/^---+\s*$/.test(ln)){ out.push('<hr>'); i++; continue; }
    // blockquote
    if(/^>\s?/.test(ln)){
      const buf = [];
      while(i < lines.length && /^>\s?/.test(lines[i])){ buf.push(lines[i].replace(/^>\s?/,'')); i++; }
      out.push('<blockquote>'+buf.map(b=>inline(b)).join('<br>')+'</blockquote>');
      continue;
    }
    // list
    if(/^[-*]\s+/.test(ln)){
      const buf = [];
      while(i < lines.length && /^[-*]\s+/.test(lines[i])){ buf.push(lines[i].replace(/^[-*]\s+/,'')); i++; }
      out.push('<ul>'+buf.map(b=>'<li>'+inline(b)+'</li>').join('')+'</ul>');
      continue;
    }
    if(/^\d+\.\s+/.test(ln)){
      const buf = [];
      while(i < lines.length && /^\d+\.\s+/.test(lines[i])){ buf.push(lines[i].replace(/^\d+\.\s+/,'')); i++; }
      out.push('<ol>'+buf.map(b=>'<li>'+inline(b)+'</li>').join('')+'</ol>');
      continue;
    }
    if(/^\s*$/.test(ln)){ i++; continue; }
    // GFM pipe table: header row + separator row + body rows
    if(/\|/.test(ln) && i+1 < lines.length && /^\s*\|?\s*:?-{2,}:?\s*(\|\s*:?-{2,}:?\s*)+\|?\s*$/.test(lines[i+1])){
      const splitRow = (r)=>{
        let s = r.trim();
        if(s.startsWith('|')) s = s.slice(1);
        if(s.endsWith('|')) s = s.slice(0,-1);
        return s.split('|').map(c=>c.trim());
      };
      const aligns = splitRow(lines[i+1]).map(seg=>{
        const L = seg.startsWith(':'), R = seg.endsWith(':');
        return L && R ? 'center' : R ? 'right' : L ? 'left' : '';
      });
      const header = splitRow(ln);
      i += 2;
      const rows = [];
      while(i < lines.length && /\|/.test(lines[i]) && lines[i].trim()){
        rows.push(splitRow(lines[i])); i++;
      }
      const styleFor = (k)=> aligns[k] ? ` style="text-align:${aligns[k]}"` : '';
      const thead = '<thead><tr>'+header.map((c,k)=>'<th'+styleFor(k)+'>'+inline(c)+'</th>').join('')+'</tr></thead>';
      const tbody = '<tbody>'+rows.map(r=>'<tr>'+r.map((c,k)=>'<td'+styleFor(k)+'>'+inline(c)+'</td>').join('')+'</tr>').join('')+'</tbody>';
      out.push('<table>'+thead+tbody+'</table>');
      continue;
    }
    // paragraph (collect contiguous non-special lines)
    const buf = [];
    while(i < lines.length && lines[i].trim() && !/^(#{1,3}\s|>\s?|[-*]\s|\d+\.\s|```|---+\s*$)/.test(lines[i])){
      buf.push(lines[i]); i++;
    }
    out.push('<p>'+buf.map(b=>inline(b)).join('<br>')+'</p>');
  }
  return out.join('');
  function inline(s){
    s = escHtml(s);
    s = s.replace(/`([^`]+)`/g, (m,a)=>'<code>'+a+'</code>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/(^|[\s(])\*([^*\n]+)\*(?=[\s).,!?:;]|$)/g, '$1<em>$2</em>');
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m,t,u)=>'<a href="'+u+'" target="_blank" rel="noopener">'+t+'</a>');
    return s;
  }
}
function newCol(){ return { id:uid(), name:'', type:'', nullable:false, primary_key:false, unique:false, index:false, server_default:'', no_autoincrement:false }; }
function toCamel(s){ return (s||'').split(/[_\s]+/).filter(Boolean).map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join('') || 'Unnamed'; }
function newTable(x=200,y=200){
  const tn = 'new_table';
  return { id:uid(), table_name:tn, x, y,
    columns:[{...newCol(), name:'id_'+tn, type:'BIGINT', primary_key:true}],
    constraints:[] };
}
function newTab(name='Tab 1'){ return { id:uid(), name, tables:[], links:[] }; }

function blankDraft(name){ return { name, tabs:[newTab()] }; }

function setStatus(s){ $('#status').textContent = s; setTimeout(()=>{ if($('#status').textContent===s) $('#status').textContent=''; },2500); }
function markSaved(){ dirty=false; $('#status').textContent='✓ saved'; setTimeout(()=>{ if(!dirty) $('#status').textContent=''; },2000); }
let history = { past: [], future: [], baseline: null };
let histTimer = null;
function clone(o){ return JSON.parse(JSON.stringify(o)); }
function commitHistory(){
  if(!history.baseline) return;
  history.past.push(history.baseline);
  if(history.past.length>100) history.past.shift();
  history.future = [];
  history.baseline = clone(state);
  updateHistButtons();
}
function markDirty(){
  dirty=true; $('#status').textContent='● unsaved';
  if(histTimer) clearTimeout(histTimer);
  histTimer = setTimeout(commitHistory, 400);
}
function updateHistButtons(){
  const u = document.getElementById('undoBtn'); const r = document.getElementById('redoBtn');
  if(u){ u.disabled = history.past.length===0; u.style.opacity = u.disabled?0.4:1; }
  if(r){ r.disabled = history.future.length===0; r.style.opacity = r.disabled?0.4:1; }
}
function undo(){
  if(histTimer){ clearTimeout(histTimer); histTimer=null; commitHistory(); }
  if(!history.past.length) return;
  history.future.push(clone(state));
  const prev = history.past.pop();
  state = prev;
  history.baseline = clone(state);
  if(!state.tabs.find(t=>t.id===currentTabId)) currentTabId = state.tabs[0]?.id;
  dirty=true; $('#status').textContent='● unsaved (undo)';
  render(); updateHistButtons();
}
function redo(){
  if(!history.future.length) return;
  history.past.push(clone(state));
  const next = history.future.pop();
  state = next;
  history.baseline = clone(state);
  if(!state.tabs.find(t=>t.id===currentTabId)) currentTabId = state.tabs[0]?.id;
  dirty=true; $('#status').textContent='● unsaved (redo)';
  render(); updateHistButtons();
}

async function loadDraftList(){
  const r = await fetch('/api/drafts'); const list = await r.json();
  const sel = $('#draftSelect'); sel.innerHTML='';
  list.forEach(d=>{
    const o = document.createElement('option'); o.value=d.name; o.textContent=d.name; sel.appendChild(o);
  });
  if(list.length && !currentDraftName){ currentDraftName = list[0].name; sel.value=currentDraftName; await loadDraft(currentDraftName); }
  else if(currentDraftName){ sel.value = currentDraftName; }
}

function normalize(st){
  if(!st.tabs || !st.tabs.length) st.tabs=[newTab()];
  st.tabs.forEach(tab=>{
    if(!tab.id) tab.id = uid();
    tab.tables = tab.tables || [];
    tab.links = tab.links || [];
    tab.tables.forEach(t=>{
      if(!t.id) t.id = uid();
      if(!t.table_name && t.name) t.table_name = t.name.replace(/(?<!^)(?=[A-Z])/g,'_').toLowerCase();
      t.columns = t.columns || [];
      t.columns.forEach(c=>{ if(!c.id) c.id = uid(); });
      t.constraints = t.constraints || [];
    });
  });
}
async function loadDraft(name){
  const r = await fetch('/api/drafts/'+encodeURIComponent(name));
  if(!r.ok){ state = blankDraft(name); }
  else state = await r.json();
  normalize(state);
  currentTabId = state.tabs[0].id;
  _lastRenderedTabId = null;
  dirty=false;
  history = { past: [], future: [], baseline: clone(state) };
  sessionBaseline = clone(state);
  render(); updateHistButtons();
}
let sessionBaseline = null;
function tableSig(t){
  if(!t) return null;
  const c = clone(t); delete c.x; delete c.y; delete c.collapsed;
  (c.columns||[]).forEach(col=>delete col.id);
  return JSON.stringify(c);
}
function isTableModified(t){
  if(!sessionBaseline) return false;
  for(const tab of (sessionBaseline.tabs||[])){
    const base = (tab.tables||[]).find(x=>x.id===t.id);
    if(base) return tableSig(base) !== tableSig(t);
  }
  return true; // not in baseline → new
}

async function saveDraft(){
  if(!state) return;
  const r = await fetch('/api/drafts/'+encodeURIComponent(currentDraftName),{
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(state)
  });
  if(r.ok){ markSaved(); }
}

function currentTab(){ return state.tabs.find(t=>t.id===currentTabId); }

let _lastRenderedTabId = null;
function render(){
  if(currentTabId !== _lastRenderedTabId){
    restoreView();
    _lastRenderedTabId = currentTabId;
  }
  renderTabs();
  renderCanvas();
}

function renderTabs(){
  const wrap = $('#tabs'); wrap.innerHTML='';
  state.tabs.forEach(t=>{
    const el = document.createElement('span');
    el.className='tab'+(t.id===currentTabId?' active':'');
    const lbl = document.createElement('span'); lbl.textContent=t.name;
    lbl.ondblclick=(e)=>{
      const nm = prompt('Tab name:', t.name); if(nm){ t.name=nm; markDirty(); renderTabs(); }
    };
    lbl.onclick=()=>{ currentTabId=t.id; render(); };
    el.appendChild(lbl);
    const dp = document.createElement('span'); dp.className='x'; dp.textContent='❏'; dp.title='Duplicate this tab'; dp.style.fontSize='14px';
    dp.onclick=(e)=>{
      e.stopPropagation();
      const copy = JSON.parse(JSON.stringify(t));
      copy.id = uid();
      copy.name = (t.name||'Tab')+' copy';
      const idMap = {};
      (copy.tables||[]).forEach(tb=>{
        const oid = tb.id; tb.id = uid(); idMap[oid] = tb.id;
        (tb.columns||[]).forEach(c=>c.id = uid());
      });
      (copy.links||[]).forEach(l=>{
        if(idMap[l.fromTable]) l.fromTable = idMap[l.fromTable];
        if(idMap[l.toTable]) l.toTable = idMap[l.toTable];
      });
      const idx = state.tabs.indexOf(t);
      state.tabs.splice(idx+1, 0, copy);
      currentTabId = copy.id;
      markDirty(); render();
    };
    el.appendChild(dp);
    const x = document.createElement('span'); x.className='x'; x.textContent='✕'; x.title='Delete this tab';
    x.onclick=(e)=>{ e.stopPropagation(); if(state.tabs.length<=1) return alert('cannot delete last tab'); if(!confirm('Delete tab?')) return; state.tabs = state.tabs.filter(z=>z.id!==t.id); if(currentTabId===t.id) currentTabId=state.tabs[0].id; markDirty(); render(); };
    el.appendChild(x);
    wrap.appendChild(el);
  });
}

function focusTable(id){
  const tab = currentTab(); if(!tab) return;
  const linkedTables = new Set();
  if(id){
    linkedTables.add(id);
    (tab.links||[]).forEach(l=>{
      if(l.hidden) return;
      if(l.fromTable===id) linkedTables.add(l.toTable);
      if(l.toTable===id) linkedTables.add(l.fromTable);
    });
  }
  document.querySelectorAll('.table').forEach(el=>{
    el.classList.remove('dim','focused');
    if(!id) return;
    if(el.dataset.id===id) el.classList.add('focused');
    else if(!linkedTables.has(el.dataset.id)) el.classList.add('dim');
  });
  document.querySelectorAll('#linkSvg .linkg').forEach((g,i)=>{
    g.classList.remove('dim','focused');
    if(!id) return;
    const l = (tab.links||[]).filter(z=>!z.hidden)[i];
    if(!l) return;
    if(l.fromTable===id || l.toTable===id) g.classList.add('focused');
    else g.classList.add('dim');
  });
}
function renderCanvas(){
  const c = $('#canvas'); c.innerHTML='';
  const tab = currentTab(); if(!tab) return;
  c.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
  $('#zoom').textContent = Math.round(zoom*100)+'%';
  tab.tables.forEach(t=>c.appendChild(renderTable(t)));
  (tab.notes||[]).forEach(n=>c.appendChild(renderNote(n)));
  renderLinks();
  updateCoords();
  applySelectionDom();
}

function renderNote(n){

  if(n.collapsed && n.hMin) el.style.height = n.hMin+'px';
  const h = document.createElement('div'); h.className='note-header';

  if(n.collapsed){ ttl.readOnly = true; ttl.title = 'Expand the note to edit its title'; ttl.style.cursor = 'inherit'; }
  else { ttl.title = 'Click to edit note title'; }
  const sizeTtl = ()=>{
    const m = sizeTtl._m || (sizeTtl._m = (()=>{ const s=document.createElement('span'); s.style.cssText='position:absolute;visibility:hidden;white-space:pre;left:-9999px;top:0;'; document.body.appendChild(s); return s; })());
    const cs = getComputedStyle(ttl);
    m.style.font = cs.font; m.style.fontWeight = cs.fontWeight; m.style.letterSpacing = cs.letterSpacing;
    m.textContent = ttl.value || ttl.placeholder || '';
    ttl.style.width = Math.max(60, m.offsetWidth + 12) + 'px';
  };
  ttl.oninput = ()=>{ n.title = ttl.value; markDirty(); sizeTtl(); };
  ttl.addEventListener('mousedown',(e)=>{ if(!n.collapsed) e.stopPropagation(); });
  requestAnimationFrame(sizeTtl);
  ttlWrap.appendChild(ttl);
  h.appendChild(ttlWrap);
  const tg = document.createElement('button'); tg.textContent = n.collapsed?'▣':'▬'; tg.title= n.collapsed ? 'Expand note' : 'Minimize note';
  tg.onclick=(e)=>{ e.stopPropagation(); n.collapsed=!n.collapsed; markDirty(); renderCanvas(); };
  h.appendChild(tg);
  const dl = document.createElement('button'); dl.textContent='✕'; dl.title='Delete note';
  dl.onclick=(e)=>{ e.stopPropagation(); const tab=currentTab(); tab.notes=(tab.notes||[]).filter(z=>z.id!==n.id); markDirty(); renderCanvas(); };
  h.appendChild(dl);
  el.appendChild(h);
  const ta = document.createElement('textarea'); ta.value=n.text||''; ta.placeholder='Type a note... (markdown supported)';
  ta.oninput=()=>{ n.text=ta.value; markDirty(); const pv=el.querySelector('.note-preview'); if(pv) pv.innerHTML = mdToHtml(ta.value); };
  el.appendChild(ta);
  const pv = document.createElement('div'); pv.className='note-preview'; pv.innerHTML = mdToHtml(n.text||'');
  el.appendChild(pv);
  // resize handle (works both minimized and expanded)
  const rh = document.createElement('div'); rh.className='resize-handle'; rh.title='Drag to resize';
  el.appendChild(rh);
  let rz=null;
  rh.addEventListener('mousedown',(e)=>{
    e.stopPropagation(); e.preventDefault();
    const r = el.getBoundingClientRect();
    rz = { x:e.clientX, y:e.clientY, w:r.width/zoom, h:r.height/zoom };
  });
  window.addEventListener('mousemove',(e)=>{
    if(!rz) return;
    const nw = Math.max(160, rz.w + (e.clientX-rz.x)/zoom);
    const nh = Math.max(60, rz.h + (e.clientY-rz.y)/zoom);
    el.style.width = nw+'px'; el.style.height = nh+'px';
    if(n.collapsed){ n.wMin = nw; n.hMin = nh; } else { n.w = nw; n.h = nh; }
  });
  window.addEventListener('mouseup',()=>{ if(rz){ rz=null; markDirty(); } });
  // drag
  h.addEventListener('mousedown',(e)=>{
    if(e.target.tagName==='BUTTON'||e.target.tagName==='INPUT') return;
    if(e.ctrlKey||e.metaKey){ toggleSelection('note', n.id); e.preventDefault(); return; }
    startGroupDrag({type:'note', entity:n}, e);
  });
  return el;
}

function renderLinks(){
  const svg = $('#linkSvg');
  svg.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
  svg.innerHTML='';
  const tab = currentTab(); if(!tab) return;
  const SVGNS = 'http://www.w3.org/2000/svg';
  // Faint infinite X/Y axes through canvas origin (0,0)
  const axH = document.createElementNS(SVGNS,'line');
  axH.setAttribute('x1',-100000); axH.setAttribute('x2',100000); axH.setAttribute('y1',0); axH.setAttribute('y2',0);
  axH.setAttribute('stroke','rgba(180,200,255,0.10)'); axH.setAttribute('stroke-width','1');
  const axV = document.createElementNS(SVGNS,'line');
  axV.setAttribute('x1',0); axV.setAttribute('x2',0); axV.setAttribute('y1',-100000); axV.setAttribute('y2',100000);
  axV.setAttribute('stroke','rgba(180,200,255,0.10)'); axV.setAttribute('stroke-width','1');
  svg.appendChild(axH); svg.appendChild(axV);
  const wrap = document.getElementById('canvasWrap');
  const wrapRect = wrap.getBoundingClientRect();
  function toCanvas(x, y){ return { x: (x - wrapRect.left - panX) / zoom, y: (y - wrapRect.top - panY) / zoom }; }
  function anchor(tbl, colId){
    const el = document.querySelector('.table[data-id="'+tbl.id+'"]');
    if(!el) return { left: tbl.x, right: tbl.x+290, cy: tbl.y+24 };
    const tRect = el.getBoundingClientRect();
    const tlA = toCanvas(tRect.left, tRect.top);
    const trA = toCanvas(tRect.right, tRect.top);
    let cy = tlA.y + 24;
    if(colId){
      const cel = el.querySelector('[data-col="'+colId+'"]');
      if(cel){
        const r = cel.getBoundingClientRect();
        cy = toCanvas(r.left, r.top + r.height/2).y;
      }
    }
    return { left: tlA.x, right: trA.x, cy };
  }
  (tab.links||[]).forEach(l=>{
    if(l.hidden) return;
    const a = tab.tables.find(t=>t.id===l.fromTable);
    const b = tab.tables.find(t=>t.id===l.toTable);
    if(!a||!b) return;
    const A = anchor(a, l.fromCol);
    const B = anchor(b, l.toCol);
    let ax, bx;
    if(A.right <= B.left){ ax = A.right; bx = B.left; }
    else if(B.right <= A.left){ ax = A.left; bx = B.right; }
    else { ax = A.right; bx = B.left; }
    const ay = A.cy, by = B.cy;
    const g = document.createElementNS(SVGNS,'g'); g.setAttribute('class','linkg');
    const line = document.createElementNS(SVGNS,'line'); line.setAttribute('class','lvis');
    line.setAttribute('x1',ax); line.setAttribute('y1',ay);
    line.setAttribute('x2',bx); line.setAttribute('y2',by);
    g.appendChild(line);
    const hit = document.createElementNS(SVGNS,'line'); hit.setAttribute('class','lhit');
    hit.setAttribute('x1',ax); hit.setAttribute('y1',ay);
    hit.setAttribute('x2',bx); hit.setAttribute('y2',by);
    g.appendChild(hit);
    const d1 = document.createElementNS(SVGNS,'circle'); d1.setAttribute('cx',ax); d1.setAttribute('cy',ay); d1.setAttribute('r',3); d1.setAttribute('fill','var(--accent)');
    const d2 = document.createElementNS(SVGNS,'circle'); d2.setAttribute('cx',bx); d2.setAttribute('cy',by); d2.setAttribute('r',3); d2.setAttribute('fill','var(--accent)');
    g.appendChild(d1); g.appendChild(d2);
    const lx = document.createElementNS(SVGNS,'g'); lx.setAttribute('class','lx');
    lx.setAttribute('transform',`translate(${(ax+bx)/2},${(ay+by)/2})`);
    const circ = document.createElementNS(SVGNS,'circle'); circ.setAttribute('r','10');
    const txt = document.createElementNS(SVGNS,'text'); txt.textContent='×';
    lx.appendChild(circ); lx.appendChild(txt);
    g.appendChild(lx);
    g.addEventListener('mousemove',(e)=>{
      const p = toCanvas(e.clientX, e.clientY);
      const dx = bx-ax, dy = by-ay;
      const lenSq = dx*dx + dy*dy || 1;
      let t = ((p.x-ax)*dx + (p.y-ay)*dy) / lenSq;
      t = Math.max(0, Math.min(1, t));
      const px = ax + t*dx, py = ay + t*dy;
      lx.setAttribute('transform',`translate(${px},${py})`);
    });
    lx.addEventListener('click',(e)=>{
      e.stopPropagation();
      tab.links = tab.links.filter(z=>z!==l);
      markDirty(); renderLinks();
    });
    svg.appendChild(g);
  });
}

  if(blHas){ blm.disabled=true; blm.style.opacity=.4; blm.style.cursor='not-allowed'; }

    if(!hasCol('created_by')) t.columns.push({...newCol(), name:'created_by', type:'BIGINT'});

    cI.oninput=()=>{ ct.columns = cI.value.split(',').map(s=>s.trim()).filter(Boolean); markDirty(); };

    x.onclick=()=>{ t.constraints.splice(ci,1); markDirty(); renderCanvas(); };
    cr.appendChild(x);
    cs.appendChild(cr);
  });
  const addC = document.createElement('button'); addC.className='add'; addC.textContent='+ constraint'; addC.title='Add a multi-column unique constraint or index';
  addC.onclick=()=>{ (t.constraints=t.constraints||[]).push({kind:'unique',name:'',columns:[]}); markDirty(); renderCanvas(); };
  cs.appendChild(addC);
  el.appendChild(cs);

  // drag
  h.addEventListener('mousedown',(e)=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='BUTTON')return;
    if(e.ctrlKey||e.metaKey){ toggleSelection('table', t.id); e.preventDefault(); return; }
    startGroupDrag({type:'table', entity:t}, e);
  });

  // corner resize for table width
  const rh = document.createElement('div'); rh.className='resize-handle'; rh.title='Drag to resize table width';
  el.appendChild(rh);
  rh.addEventListener('mousedown',(e)=>{
    e.preventDefault(); e.stopPropagation();
    const r = el.getBoundingClientRect();
    const startX = e.clientX, startW = r.width/zoom;
    const onMove = (ev)=>{
      const nw = Math.max(290, startW + (ev.clientX-startX)/zoom);
      t.w = nw; el.style.width = nw+'px'; renderLinks();
    };
    const onUp = ()=>{
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      markDirty();
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });

  buildColNotesStack(t, el);
  return el;
}

function buildColNotesStack(t, el){
  const stack = document.createElement('div'); stack.className='col-notes-stack';
  el.appendChild(stack);
  t.columns.forEach(c=>{
    if(!c.comment) return;
    const cbub = document.createElement('div');
    cbub.className='note-bubble note-col'+(c.comment_pinned?' pinned':'');
    const chd = document.createElement('div'); chd.className='note-head';
    const cht = document.createElement('span'); cht.className='ht'; cht.textContent='Comment on: '+(t.table_name||'')+'.'+(c.name||''); chd.appendChild(cht);
    const ced = document.createElement('button'); ced.className='pin-btn'; ced.textContent='✎'; ced.title='Edit comment';
    ced.addEventListener('click',(e)=>{ e.stopPropagation(); openPopover(ced, 'Comment on '+(c.name||'column'), ()=>c.comment, v=>{ c.comment=v; if(!v) c.comment_pinned=false; }); });
    chd.appendChild(ced);
    const cpn = document.createElement('button'); cpn.className='pin-btn'+(c.comment_pinned?' on':''); cpn.textContent='📌'; cpn.title= c.comment_pinned?'Unpin comment':'Pin comment so it stays visible';
    cpn.addEventListener('click',(e)=>{ e.stopPropagation(); c.comment_pinned=!c.comment_pinned; markDirty(); renderCanvas(); });
    chd.appendChild(cpn);
    cbub.appendChild(chd);
    const cbody = document.createElement('div'); cbody.className='note-body';
    const ctx = document.createElement('span'); ctx.className='note-text md'; ctx.innerHTML = mdToHtml(c.comment); cbody.appendChild(ctx);
    cbub.appendChild(cbody);
    stack.appendChild(cbub);

    const rowEl = el.querySelector('[data-col="'+c.id+'"]');
    if(rowEl){
      let hideT = null, onRow = false, onBub = false;
      const show = ()=>{ clearTimeout(hideT); cbub.classList.add('visible'); };
      const hide = ()=>{ clearTimeout(hideT); hideT = setTimeout(()=>{ if(!onRow && !onBub) cbub.classList.remove('visible'); }, 250); };
      rowEl.addEventListener('mouseenter',()=>{ onRow=true; show(); });
      rowEl.addEventListener('mouseleave',()=>{ onRow=false; hide(); });
      cbub.addEventListener('mouseenter',()=>{ onBub=true; show(); });
      cbub.addEventListener('mouseleave',()=>{ onBub=false; hide(); });
    }
  });
}

// canvas pan/zoom
const cw = $('#canvasWrap');
let panning=null;
cw.addEventListener('mousedown',(e)=>{
  if(e.target===cw || e.target.id==='canvas' || e.target.id==='linkSvg'){
    panning={x:e.clientX, y:e.clientY, px:panX, py:panY};
  }
});
window.addEventListener('mousemove',(e)=>{
  if(!panning) return;
  panX = panning.px + (e.clientX-panning.x);
  panY = panning.py + (e.clientY-panning.y);
  $('#canvas').style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
  $('#linkSvg').style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
  updateCoords();
});
window.addEventListener('mouseup',()=>{ if(panning){ panning=null; saveView(); } });
function updateCoords(){
  const x = Math.round(-panX / zoom);
  const y = Math.round(-panY / zoom);
  $('#coords').textContent = 'x: '+x+', y: '+y;
}
cw.addEventListener('wheel',(e)=>{
  if(!e.ctrlKey && !e.metaKey) return;
  e.preventDefault();
  const d = e.deltaY < 0 ? 1.1 : 0.9;
  const newZoom = Math.min(2, Math.max(0.3, zoom*d));
  if(newZoom !== zoom){
    const r = cw.getBoundingClientRect();
    const cx = e.clientX - r.left, cy = e.clientY - r.top;
    const wx = (cx - panX) / zoom, wy = (cy - panY) / zoom;
    zoom = newZoom;
    panX = cx - wx * zoom;
    panY = cy - wy * zoom;
  }
  $('#canvas').style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
  $('#linkSvg').style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
  $('#zoom').textContent=Math.round(zoom*100)+'%';
  renderLinks(); updateCoords(); saveView();
},{passive:false});

  const heights = tab.tables.map(t => t.collapsed ? (40 + (t.columns?.length||0)*20) : (180 + (t.columns?.length||0)*22 + (t.constraints?.length||0)*22));
  // simple grid using max height per row
  let x=60, y=60, colIx=0, rowMax=0;
  tab.tables.forEach((t,i)=>{

$('#snapBtn').onclick = ()=>snapshotCanvas();
async function snapshotCanvas(){
  if(typeof html2canvas !== 'function'){
    setStatus('snapshot library not loaded — check your connection');
    return;
  }
  const tab = currentTab(); if(!tab) return;
  const elems = Array.from(document.querySelectorAll('#canvas > .table, #canvas > .note'));
  if(!elems.length){ setStatus('nothing to snapshot'); return; }
  setStatus('rendering snapshot…');

  // Compute bbox in canvas-coords (incl. overflowing comment bubbles)
  const wrap = document.getElementById('canvasWrap');
  const wrapRect = wrap.getBoundingClientRect();
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  elems.forEach(el=>{
    let bx1=Infinity, by1=Infinity, bx2=-Infinity, by2=-Infinity;
    const r = el.getBoundingClientRect();
    bx1=r.left; by1=r.top; bx2=r.right; by2=r.bottom;
    el.querySelectorAll('.note-bubble, .col-notes-stack, .col-notes-stack > *').forEach(child=>{
      const cr = child.getBoundingClientRect();
      if(cr.width===0 && cr.height===0) return;
      if(cr.left<bx1) bx1=cr.left; if(cr.top<by1) by1=cr.top;
      if(cr.right>bx2) bx2=cr.right; if(cr.bottom>by2) by2=cr.bottom;
    });
    const ox = (bx1 - wrapRect.left - panX)/zoom;
    const oy = (by1 - wrapRect.top  - panY)/zoom;
    const ow = (bx2-bx1)/zoom, oh = (by2-by1)/zoom;
    minX=Math.min(minX,ox); minY=Math.min(minY,oy);
    maxX=Math.max(maxX,ox+ow); maxY=Math.max(maxY,oy+oh);
  });
  const pad = 60;
  minX -= pad; minY -= pad; maxX += pad; maxY += pad;
  const W = Math.max(1, maxX-minX), H = Math.max(1, maxY-minY);

  // Build an offscreen, on-page container that mirrors canvas content at zoom=1,
  // so html2canvas captures everything cleanly without the canvas pan/scale transform.
  const stage = document.createElement('div');
  stage.style.cssText = `position:fixed; left:-99999px; top:0; width:${W}px; height:${H}px; background:${getComputedStyle(document.body).backgroundColor||'#16161a'}; pointer-events:none; overflow:hidden;`;
  stage.className = 'snapshot-stage';

  // Clone the link SVG into the stage, shifted by -minX,-minY
  const SVGNS = 'http://www.w3.org/2000/svg';
  const linkSvg = document.getElementById('linkSvg');
  const svgClone = document.createElementNS(SVGNS,'svg');
  svgClone.setAttribute('width', W); svgClone.setAttribute('height', H);
  svgClone.style.cssText = `position:absolute; left:0; top:0; pointer-events:none; overflow:visible;`;
  const linkG = document.createElementNS(SVGNS,'g');
  linkG.setAttribute('transform', `translate(${-minX},${-minY})`);
  Array.from(linkSvg.children).forEach(child=>{
    if(child.tagName==='line' && child.getAttribute('stroke') && child.getAttribute('stroke').startsWith('rgba(180')) return;
    const clone = child.cloneNode(true);
    if(clone.querySelectorAll){
      clone.querySelectorAll('.lx, .lhit').forEach(n=>n.remove());
      clone.querySelectorAll('.lvis').forEach(line=>{
        line.setAttribute('stroke','#5ac8a8');
        line.setAttribute('stroke-width','2.5');
        line.setAttribute('opacity','0.85');
      });
    }
    linkG.appendChild(clone);
  });
  svgClone.appendChild(linkG);
  stage.appendChild(svgClone);

  // Clone every entity DOM and reposition into the stage's coordinate space
  elems.forEach(el=>{
    const r = el.getBoundingClientRect();
    const ox = (r.left - wrapRect.left - panX)/zoom - minX;
    const oy = (r.top  - wrapRect.top  - panY)/zoom - minY;
    const clone = el.cloneNode(true);
    clone.style.left = ox+'px';
    clone.style.top = oy+'px';
    clone.style.width = (r.width/zoom)+'px';
    clone.style.transform = 'none';
    clone.querySelectorAll('.resize-handle, .col-resize').forEach(n=>n.remove());
    clone.querySelectorAll('button').forEach(b=>{
      const t = (b.textContent||'').trim();
      if(/^(✕|🗑|❏|▬|▣|🔗|💬|✎|📌|⚠ confirm)$/.test(t)) b.remove();
    });
    stage.appendChild(clone);
  });

  document.body.appendChild(stage);
  try {
    const result = await html2canvas(stage, {
      backgroundColor: getComputedStyle(document.body).backgroundColor || '#16161a',
      scale: 3,
      logging: false,
      useCORS: true,
      width: W, height: H,
      windowWidth: W, windowHeight: H,
    });
    const tabName = (tab.name||'tab').replace(/[^\w-]+/g,'_');
    const fname = `${currentDraftName||'draft'}-${tabName}.png`;
    result.toBlob((b)=>{
      if(!b){ setStatus('snapshot failed'); return; }
      const a = document.createElement('a');
      const dl = URL.createObjectURL(b);
      a.href = dl; a.download = fname; a.click();
      setTimeout(()=>URL.revokeObjectURL(dl), 1000);
      setStatus('snapshot saved');
    }, 'image/png');
  } catch(err){
    console.error('snapshot failed', err);
    setStatus('snapshot failed — see console');
  } finally {
    stage.remove();
  }
}

function importPaste(){
  $('#modalBody').innerHTML = '<h3 style="margin:0 0 8px">Import Python Tables</h3>'
    + '<p style="margin:0 0 6px;color:#aaa;font-size:11px">Paste class definitions in the same format as Export. Tables will be added to the current tab.</p>'
    + '<textarea id="importTxt" style="width:600px;height:300px;background:#18181c;color:#e4e4e8;border:1px solid #444;border-radius:4px;padding:8px;font-family:monospace;font-size:11px"></textarea>';
  openModal({primaryLabel:'⇩ Append to Tab', primaryTitle:'Parse and append tables', showCopy:false});
  const pb = $('#primaryBtn');
  pb.onclick = async ()=>{
    const src = $('#importTxt').value;
    if(!src.trim()) return;
    const r = await fetch('/api/parse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({source:src})});
    const j = await r.json();
    const tab = currentTab();
    const imported = [];
    let x = 80, y = 80;
    const existingByName = {};
    (tab.tables||[]).forEach(t=>{ if(t.table_name) existingByName[t.table_name.toLowerCase()] = t; });
    let addedTables = 0, mergedTables = 0, addedCols = 0;
    (j.tables||[]).forEach(tb=>{
      const key = (tb.table_name||'').toLowerCase();
      const exists = key && existingByName[key];
      if(exists){
        const existingCols = new Set((exists.columns||[]).map(c=>(c.name||'').toLowerCase()));
        let touched = false;
        (tb.columns||[]).forEach(c=>{
          if(!existingCols.has((c.name||'').toLowerCase())){
            c.id = uid();
            exists.columns.push(c);
            addedCols++;
            touched = true;
          }
        });
        if(touched){ mergedTables++; imported.push(exists.id); }
      } else {
        tb.id = uid();
        tb.x = x; tb.y = y; tb.collapsed = true;
        x += 320; if(x > 1400){ x=80; y += 260; }
        (tb.columns||[]).forEach(c=>c.id = uid());
        tab.tables.push(tb);
        if(key) existingByName[key] = tb;
        imported.push(tb.id);
        addedTables++;
      }
    });
    // Heuristic links: id_<table> -> <table>.PK ; <table>_<column> -> <table>.<column>
    tab.links = tab.links || [];
    const byName = {};
    tab.tables.forEach(t=>{ if(t.table_name) byName[t.table_name.toLowerCase()] = t; });
    const linkKey = (a,b,c,d)=>a+'|'+b+'|'+c+'|'+d;
    const existing = new Set((tab.links||[]).map(l=>linkKey(l.fromTable,l.fromCol,l.toTable,l.toCol)));
    let added = 0;
    tab.tables.forEach(t=>{
      (t.columns||[]).forEach(col=>{
        const nm = (col.name||'').toLowerCase();
        if(!nm) return;
        // id_<table> → <table>.PK
        if(nm.startsWith('id_')){
          const target = byName[nm.slice(3)];
          if(target && target!==t){
            const pk = (target.columns||[]).find(c=>c.primary_key) || (target.columns||[])[0];
            if(pk){
              const k = linkKey(t.id,col.id,target.id,pk.id);
              if(!existing.has(k)){ tab.links.push({fromTable:t.id,fromCol:col.id,toTable:target.id,toCol:pk.id}); existing.add(k); added++; }
            }
          }
          return;
        }
        // <table>_<column> e.g. scope_code → scope.code
        const us = nm.lastIndexOf('_');
        if(us>0){
          const tn = nm.slice(0,us); const cn = nm.slice(us+1);
          const target = byName[tn];
          if(target && target!==t){
            const tcol = (target.columns||[]).find(c=>(c.name||'').toLowerCase()===cn);
            if(tcol){
              const k = linkKey(t.id,col.id,target.id,tcol.id);
              if(!existing.has(k)){ tab.links.push({fromTable:t.id,fromCol:col.id,toTable:target.id,toCol:tcol.id}); existing.add(k); added++; }
            }
          }
        }
      });
    });
    const parts = [];
    if(addedTables) parts.push(addedTables+' new tables');
    if(mergedTables) parts.push(mergedTables+' merged (+'+addedCols+' cols)');
    if(added) parts.push('+'+added+' auto-links');
    if(parts.length) setTimeout(()=>setStatus(parts.join(', ')), 100);
    markDirty(); $('#modal').style.display='none'; renderCanvas();
    requestAnimationFrame(()=>{
      imported.forEach(id=>{
        const el = document.querySelector('.table[data-id="'+id+'"]');
        if(el){ el.classList.add('flash'); setTimeout(()=>el.classList.remove('flash'), 1500); }
      });
    });
    setStatus('imported '+(j.tables||[]).length+' tables');
  };
}

function uploadDraftFile(){
  const fi = document.getElementById('fileInput');
  fi.onchange = async (ev)=>{
    const f = ev.target.files[0]; if(!f) return;
    const txt = await f.text();
    let data; try { data = JSON.parse(txt); } catch(e){ return alert('Invalid JSON'); }
    const name = prompt('Save as draft name:', (data.name || f.name.replace(/\.json$/,''))); if(!name) return;
    const r = await fetch('/api/drafts/'+encodeURIComponent(name),{method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data)});
    if(r.ok){ currentDraftName = name; await loadDraftList(); await loadDraft(name); setStatus('imported draft'); }
    fi.value = '';
  };
  fi.click();
}

function setupMenu(btnId, menuId, handlers){
  const btn = document.getElementById(btnId);
  const menu = document.getElementById(menuId);
  if(!btn||!menu) return;
  btn.addEventListener('click',(e)=>{
    e.stopPropagation();
    document.querySelectorAll('.menu.open').forEach(m=>{ if(m!==menu) m.classList.remove('open'); });
    menu.classList.toggle('open');
  });
  menu.querySelectorAll('[data-act]').forEach(it=>{
    it.addEventListener('click',(e)=>{
      e.stopPropagation();
      menu.classList.remove('open');
      const fn = handlers[it.dataset.act]; if(fn) fn();
    });
  });
}

async function copyToClipboard(text){
  text = text || '';
  try {
    if(navigator.clipboard && window.isSecureContext){
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch(err) { /* fall through to legacy */ }
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.setAttribute('readonly','');
    ta.style.position='fixed'; ta.style.top='0'; ta.style.left='0';
    ta.style.opacity='0'; ta.style.pointerEvents='none';
    document.body.appendChild(ta);
    ta.focus(); ta.select(); ta.setSelectionRange(0, ta.value.length);
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  } catch(err){ return false; }
}
function openModal(opts){
  opts = opts || {};
  const pb = $('#primaryBtn');
  if(opts.primaryLabel){
    pb.style.display=''; pb.textContent = opts.primaryLabel; pb.title = opts.primaryTitle || '';
    pb.className = 'primary' + (opts.primaryClass ? ' '+opts.primaryClass : '');
  } else {
    pb.style.display='none'; pb.onclick = null;
  }
  $('#copyBtn').style.display = opts.showCopy ? '' : 'none';
  $('#copyToast').classList.remove('show');
  $('#modal').style.display='flex';
}
function flashCopied(msg){
  const t = $('#copyToast');
  t.textContent = msg || '✓ Copied to clipboard';
  t.classList.add('show');
  clearTimeout(window._copyToastT);
  window._copyToastT = setTimeout(()=>t.classList.remove('show'), 1800);
}
$('#copyBtn').onclick = async ()=>{

// keyboard
window.addEventListener('keydown',(e)=>{
  if((e.metaKey||e.ctrlKey) && e.key==='s'){ e.preventDefault(); saveDraft(); }
  else if((e.metaKey||e.ctrlKey) && (e.key==='z'||e.key==='Z')){
    e.preventDefault();
    if(e.shiftKey) redo(); else undo();
  }
  else if((e.metaKey||e.ctrlKey) && (e.key==='y'||e.key==='Y')){ e.preventDefault(); redo(); }
  else if((e.metaKey||e.ctrlKey) && (e.key==='='||e.key==='+')){
    e.preventDefault();
    zoom = Math.min(2, zoom*1.15);
    $('#canvas').style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
    $('#linkSvg').style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
    $('#zoom').textContent = Math.round(zoom*100)+'%';
    renderLinks(); saveView();
  }
  else if((e.metaKey||e.ctrlKey) && (e.key==='-'||e.key==='_')){
    e.preventDefault();
    zoom = Math.max(0.3, zoom*0.87);
    $('#canvas').style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
    $('#linkSvg').style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
    $('#zoom').textContent = Math.round(zoom*100)+'%';
    renderLinks(); saveView();
  }
  else if((e.metaKey||e.ctrlKey) && e.key==='0'){
    e.preventDefault();
    zoom = 1; panX = 0; panY = 0;
    renderCanvas(); saveView();
  }
  else if((e.metaKey||e.ctrlKey) && (e.key==='a'||e.key==='A')){
    const ae = document.activeElement;
    if(ae && /^(INPUT|TEXTAREA)$/.test(ae.tagName)) return;
    e.preventDefault();
    selectAll();
  }
  else if(e.shiftKey && e.key==='Tab'){
    e.preventDefault();
    if(!state || !state.tabs.length) return;
    const i = state.tabs.findIndex(t=>t.id===currentTabId);
    const next = (i+1) % state.tabs.length;
    currentTabId = state.tabs[next].id;
    render();
  }
}, true);
